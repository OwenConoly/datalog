name: Build Coq Code

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rocq/rocq-prover:9.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile with Rocq 9.0.0
        run: |
          coqc --version
          make
